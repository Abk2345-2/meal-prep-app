# PantryToPlate local stack: Postgres + single backend server.
# Frontend (web) runs on the host via npm for fast hot-reload.
#
#   docker compose up postgres   # just the DB
#   docker compose up            # DB + backend
name: pantrytoplate

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
      POSTGRES_DB: pantrytoplate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry -d pantrytoplate"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: { context: ./backend }
    environment:
      DATABASE_URL: postgres://pantry:pantry@postgres:5432/pantrytoplate?sslmode=disable
      SERVER_ADDR: ":8080"
      RECIPE_PROVIDER: ${RECIPE_PROVIDER:-themealdb}
      MEALDB_BASE_URL: https://www.themealdb.com/api/json/v1/1
      SPOONACULAR_API_KEY: ${SPOONACULAR_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
